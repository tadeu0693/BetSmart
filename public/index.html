<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BetSmart IA">
<meta name="theme-color" content="#080c10">
<title>BetSmart IA</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #00ff88; --green-dk: #00cc6a;
    --bg: #080c10; --card: #0d1724; --card2: #111d2e;
    --border: #1e2d42; --text: #e2eaf6; --muted: #5a7a99;
    --yellow: #ffd166; --red: #ff4d6d; --blue: #4dabf7;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; background:var(--bg); color:var(--text); font-family:'Outfit',sans-serif; overflow-x:hidden; }

  body::before {
    content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
    background-image: linear-gradient(rgba(0,255,136,.025) 1px,transparent 1px),
                      linear-gradient(90deg,rgba(0,255,136,.025) 1px,transparent 1px);
    background-size:40px 40px;
  }

  .wrap { max-width:860px; margin:0 auto; padding:0 16px; position:relative; z-index:1; }

  /* HEADER */
  header {
    padding: 20px 16px 16px;
    border-bottom:1px solid var(--border);
    background:linear-gradient(180deg,rgba(0,255,136,.06) 0%,transparent 100%);
    position:sticky; top:0; z-index:100; backdrop-filter:blur(12px);
  }
  .header-inner { max-width:860px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; }
  .logo { font-size:1.9rem; font-weight:800; letter-spacing:2px; color:var(--green); text-shadow:0 0 28px rgba(0,255,136,.4); line-height:1; }
  .logo span { color:var(--text); }
  .logo-badge {
    background:linear-gradient(135deg,var(--green),var(--green-dk)); color:#000;
    font-size:.55rem; font-weight:800; padding:3px 8px; border-radius:20px;
    letter-spacing:1px; text-transform:uppercase; vertical-align:middle; margin-left:4px;
  }
  .logo-sub { font-size:.72rem; color:var(--muted); margin-top:2px; }
  .date-pill { font-size:.75rem; color:var(--muted); background:var(--card); padding:5px 13px; border-radius:20px; border:1px solid var(--border); }

  /* SEARCH */
  .search-box {
    background:var(--card); border:1px solid var(--border); border-radius:16px;
    padding:20px; margin:24px 0 0; box-shadow:0 4px 30px rgba(0,0,0,.3);
  }
  .section-label { font-size:.68rem; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:10px; }
  .input-row { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:16px; }
  .match-input {
    flex:1; min-width:180px; background:var(--bg); border:1px solid var(--border);
    border-radius:10px; padding:11px 15px; color:var(--text); font-size:.95rem;
    font-family:'Outfit',sans-serif; outline:none; transition:border-color .2s;
  }
  .match-input:focus { border-color:var(--green); }
  .match-input::placeholder { color:var(--muted); }
  .btn-analyze {
    background:linear-gradient(135deg,var(--green),var(--green-dk)); color:#000;
    border:none; border-radius:10px; padding:11px 22px; font-size:.9rem; font-weight:700;
    font-family:'Outfit',sans-serif; cursor:pointer; transition:all .2s; white-space:nowrap;
  }
  .btn-analyze:disabled { background:var(--border); color:var(--muted); cursor:not-allowed; }
  .btn-analyze:not(:disabled):active { transform:scale(.97); }

  .quick-grid { display:flex; flex-wrap:wrap; gap:7px; }
  .quick-btn {
    background:var(--card2); border:1px solid var(--border); border-radius:8px;
    padding:5px 11px; font-size:.74rem; color:var(--muted); cursor:pointer;
    font-family:'Outfit',sans-serif; transition:all .2s;
  }
  .quick-btn:hover, .quick-btn:active { border-color:var(--green); color:var(--green); }

  /* LOADING */
  .loading { display:none; text-align:center; padding:50px 20px; }
  .loading.show { display:block; }
  .spinner {
    width:46px; height:46px; border:3px solid var(--border); border-top-color:var(--green);
    border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 14px;
  }
  .loading-text { color:var(--muted); font-size:.88rem; animation:pulse 1.5s ease-in-out infinite; }

  /* ERROR */
  .error-box {
    display:none; background:rgba(255,77,109,.1); border:1px solid rgba(255,77,109,.3);
    border-radius:10px; padding:12px 16px; color:var(--red); font-size:.88rem; margin-top:16px;
  }
  .error-box.show { display:block; }

  /* CARD */
  .match-card {
    background:var(--card); border:1px solid var(--border); border-radius:16px;
    overflow:hidden; box-shadow:0 8px 32px rgba(0,0,0,.4); margin-top:24px;
    animation:fadeUp .4s ease both;
  }
  .card-head {
    padding:16px 20px; background:linear-gradient(135deg,var(--card2),var(--card));
    border-bottom:1px solid var(--border); display:flex; align-items:center;
    justify-content:space-between; flex-wrap:wrap; gap:8px;
  }
  .card-league { font-size:.68rem; font-weight:700; color:var(--green); text-transform:uppercase; letter-spacing:1px; margin-bottom:4px; }
  .card-match { font-size:1.4rem; font-weight:800; letter-spacing:.4px; }
  .conf-badge {
    font-size:.7rem; font-weight:700; padding:5px 13px; border-radius:20px;
    text-transform:uppercase; letter-spacing:.5px; white-space:nowrap;
  }
  .conf-high { background:rgba(0,255,136,.12); color:var(--green); border:1px solid rgba(0,255,136,.3); }
  .conf-mid  { background:rgba(255,209,102,.12); color:var(--yellow); border:1px solid rgba(255,209,102,.3); }
  .conf-low  { background:rgba(255,77,109,.12); color:var(--red); border:1px solid rgba(255,77,109,.3); }

  .card-body { padding:18px; }

  .info-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:18px; }
  @media(max-width:520px){ .info-grid { grid-template-columns:1fr; } }

  .info-block { background:var(--bg); border:1px solid var(--border); border-radius:11px; padding:13px 15px; }
  .info-title {
    font-size:.62rem; font-weight:700; text-transform:uppercase; letter-spacing:1px;
    color:var(--muted); margin-bottom:7px; display:flex; align-items:center; gap:5px;
  }
  .info-title::before { content:''; width:3px; height:11px; background:var(--green); border-radius:2px; display:inline-block; }
  .info-title.blue::before { background:var(--blue); }
  .info-text { font-size:.84rem; color:#c0d4e8; line-height:1.6; }

  .tips-title {
    font-size:.62rem; font-weight:700; text-transform:uppercase; letter-spacing:1px;
    color:var(--muted); margin-bottom:11px; display:flex; align-items:center; gap:5px;
  }
  .tips-title::before { content:''; width:3px; height:11px; background:var(--yellow); border-radius:2px; display:inline-block; }

  .tips-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(175px,1fr)); gap:9px; }

  .tip-card {
    background:var(--card2); border:1px solid var(--border); border-radius:10px;
    padding:11px 13px; transition:border-color .2s;
  }
  .tip-card:hover { border-color:var(--green); }
  .tip-market { font-size:.6rem; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.7px; margin-bottom:3px; }
  .tip-bet { font-size:.93rem; font-weight:600; color:var(--text); margin-bottom:3px; }
  .tip-reason { font-size:.73rem; color:#7a9ab8; line-height:1.4; margin-bottom:5px; }
  .tip-stars { font-size:.8rem; color:var(--yellow); }
  .risk-tag {
    display:inline-block; font-size:.6rem; font-weight:700; padding:2px 7px;
    border-radius:4px; text-transform:uppercase; letter-spacing:.5px; margin-top:4px;
  }
  .risk-low { background:rgba(0,255,136,.12); color:var(--green); }
  .risk-mid { background:rgba(255,209,102,.12); color:var(--yellow); }
  .risk-high { background:rgba(255,77,109,.12); color:var(--red); }

  /* DISCLAIMER */
  .disclaimer {
    background:rgba(255,77,109,.06); border:1px solid rgba(255,77,109,.15);
    border-radius:12px; padding:13px 16px; margin-top:24px; margin-bottom:30px;
    font-size:.76rem; color:var(--muted); text-align:center; line-height:1.6;
  }
  .disclaimer strong { color:var(--red); }

  /* EMPTY */
  .empty { text-align:center; padding:55px 20px; color:var(--muted); }
  .empty-icon { font-size:3.2rem; margin-bottom:10px; opacity:.35; }

  @keyframes spin { to { transform:rotate(360deg); } }
  @keyframes pulse { 0%,100%{opacity:.5} 50%{opacity:1} }
  @keyframes fadeUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div>
      <div class="logo">Bet<span>Smart</span><span class="logo-badge">IA</span></div>
      <div class="logo-sub">Análise inteligente de apostas esportivas</div>
    </div>
    <div class="date-pill" id="datePill"></div>
  </div>
</header>

<div class="wrap">
  <div class="search-box">
    <div class="section-label">⚡ Analisar partida</div>
    <div class="input-row">
      <input class="match-input" id="matchInput" type="text"
        placeholder="Ex: Arsenal vs Chelsea, Real Madrid vs Getafe..."
        autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
      <button class="btn-analyze" id="btnAnalyze" onclick="doAnalyze()">Analisar com IA</button>
    </div>
    <div class="section-label">🎯 Jogos rápidos</div>
    <div class="quick-grid" id="quickGrid"></div>
  </div>

  <div class="error-box" id="errorBox"></div>
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div class="loading-text" id="loadingText"></div>
  </div>

  <div id="result"></div>

  <div class="disclaimer">
    <strong>⚠️ AVISO IMPORTANTE:</strong> Este app é apenas informativo e educativo.
    Apostas envolvem risco real de perda financeira. Jogue com responsabilidade.
    Nunca aposte mais do que pode perder.
  </div>
</div>

<script>
const QUICK = [
  "Arsenal vs Chelsea - Premier League",
  "Real Betis vs Sevilha - La Liga",
  "Girona vs Celta de Vigo - La Liga",
  "Real Madrid vs Getafe - La Liga",
  "Roma vs Juventus - Serie A",
  "Torino vs Lazio - Serie A",
  "Pisa vs Bologna - Serie A",
  "Udinese vs Fiorentina - Serie A",
];

const LOADING_MSGS = [
  "🔍 Buscando informações do jogo...",
  "📊 Analisando forma recente...",
  "🏥 Verificando desfalques...",
  "🤖 Gerando previsões...",
  "✅ Finalizando análise...",
];

// Render quick buttons
const qg = document.getElementById("quickGrid");
QUICK.forEach(m => {
  const b = document.createElement("button");
  b.className = "quick-btn";
  b.textContent = "⚽ " + m.split(" - ")[0];
  b.onclick = () => { document.getElementById("matchInput").value = m; doAnalyze(); };
  qg.appendChild(b);
});

// Date
document.getElementById("datePill").textContent = new Date().toLocaleDateString("pt-BR", {
  weekday:"long", day:"2-digit", month:"long", year:"numeric"
});

// Enter
document.getElementById("matchInput").addEventListener("keydown", e => { if(e.key==="Enter") doAnalyze(); });

let loadingTimer;

function setLoading(on) {
  const el = document.getElementById("loading");
  const btn = document.getElementById("btnAnalyze");
  clearInterval(loadingTimer);
  if (on) {
    el.classList.add("show"); btn.disabled = true; btn.textContent = "Analisando...";
    let i = 0;
    document.getElementById("loadingText").textContent = LOADING_MSGS[0];
    loadingTimer = setInterval(() => { i=(i+1)%LOADING_MSGS.length; document.getElementById("loadingText").textContent = LOADING_MSGS[i]; }, 1800);
  } else {
    el.classList.remove("show"); btn.disabled = false; btn.textContent = "Analisar com IA";
  }
}

function showError(msg) {
  const el = document.getElementById("errorBox");
  el.textContent = msg; el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 6000);
}

function getTag(text, tag) {
  const re = new RegExp("\\["+tag+"\\]([\\s\\S]*?)\\[/"+tag+"\\]","i");
  const m = text.match(re); return m ? m[1].trim() : "";
}

function parseTips(raw) {
  const tips = [];
  raw.split("\n").filter(l=>l.trim().startsWith("-")).forEach(line => {
    const parts = line.replace(/^-\s*/,"").split("|").map(s=>s.trim());
    if (parts.length >= 3) {
      const r = (parts[4]||"medio").toLowerCase();
      tips.push({
        market: parts[0]||"Mercado",
        bet: parts[1]||"",
        reason: parts[2]||"",
        stars: (parts[3]||"***").replace(/[^*]/g,"").length||3,
        risk: r.includes("alto")?"high":r.includes("baixo")?"low":"mid"
      });
    }
  });
  return tips;
}

function starsHTML(n) {
  return "★".repeat(Math.min(n,5)) + '<span style="opacity:.25">' + "★".repeat(Math.max(0,5-n)) + "</span>";
}

function riskHTML(r) {
  const map = {low:["Baixo Risco","risk-low"],mid:["Médio Risco","risk-mid"],high:["Alto Risco","risk-high"]};
  const [label,cls] = map[r]||map.mid;
  return `<span class="risk-tag ${cls}">${label}</span>`;
}

function renderCard(a) {
  const confClass = {high:"conf-high",mid:"conf-mid",low:"conf-low"}[a.confidence]||"conf-mid";
  const confLabel = {high:"Confiança Alta",mid:"Confiança Média",low:"Confiança Baixa"}[a.confidence]||"Confiança Média";

  const infoBlock = (title, text, blue=false) =>
    `<div class="info-block">
      <div class="info-title${blue?" blue":""}">${title}</div>
      <div class="info-text">${text||"—"}</div>
    </div>`;

  const tipsHTML = a.tips.map(t =>
    `<div class="tip-card">
      <div class="tip-market">${t.market}</div>
      <div class="tip-bet">${t.bet}</div>
      <div class="tip-reason">${t.reason}</div>
      <div class="tip-stars">${starsHTML(t.stars)}</div>
      ${riskHTML(t.risk)}
    </div>`
  ).join("");

  document.getElementById("result").innerHTML = `
    <div class="match-card">
      <div class="card-head">
        <div>
          <div class="card-league">${a.league||""}</div>
          <div class="card-match">${a.match||""}</div>
        </div>
        <span class="conf-badge ${confClass}">${confLabel}</span>
      </div>
      <div class="card-body">
        <div class="info-grid">
          ${infoBlock("Forma — Casa", a.formHome)}
          ${infoBlock("Forma — Visitante", a.formAway)}
          ${infoBlock("Elenco — Casa", a.squadHome)}
          ${infoBlock("Elenco — Visitante", a.squadAway)}
          ${infoBlock("Histórico H2H", a.h2h, true)}
          ${infoBlock("Contexto", a.context, true)}
        </div>
        <div class="tips-title">Dicas de Apostas</div>
        <div class="tips-grid">${tipsHTML}</div>
      </div>
    </div>`;
}

async function doAnalyze() {
  const input = document.getElementById("matchInput").value.trim();
  if (!input) { showError("Digite o nome do jogo."); return; }
  document.getElementById("errorBox").classList.remove("show");
  document.getElementById("result").innerHTML = "";
  setLoading(true);

  try {
    const resp = await fetch("/api/analyze", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ match: input })
    });

    if (!resp.ok) throw new Error("Erro no servidor: " + resp.status);
    const data = await resp.json();
    if (data.error) throw new Error(data.error);

    const raw = data.text || "";
    if (!raw.includes("[MATCH]")) throw new Error("Resposta inválida. Tente novamente.");

    const confRaw = getTag(raw,"CONFIDENCE").toLowerCase();
    const analysis = {
      match: getTag(raw,"MATCH") || input,
      league: getTag(raw,"LEAGUE"),
      confidence: confRaw.includes("alta")?"high":confRaw.includes("baixa")?"low":"mid",
      formHome: getTag(raw,"FORM_HOME"),
      formAway: getTag(raw,"FORM_AWAY"),
      squadHome: getTag(raw,"SQUAD_HOME"),
      squadAway: getTag(raw,"SQUAD_AWAY"),
      h2h: getTag(raw,"H2H"),
      context: getTag(raw,"CONTEXT"),
      tips: parseTips(getTag(raw,"TIPS"))
    };

    if (!analysis.tips.length) throw new Error("Sem dicas geradas. Tente novamente.");
    renderCard(analysis);
    document.getElementById("matchInput").value = "";

  } catch(err) {
    showError("Erro: " + err.message);
  } finally {
    setLoading(false);
  }
}

// Show empty state initially
document.getElementById("result").innerHTML = `
  <div class="empty">
    <div class="empty-icon">⚽</div>
    <div>Clique em um jogo rápido ou digite o nome da partida para análise com IA</div>
  </div>`;
</script>
</body>
</html>
